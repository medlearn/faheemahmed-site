[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Friendly short paths → the functions.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# clinickly.com → serve the Clinickly Co-pilot site (which lives under /clinically/)
# at the domain root. Rewrites (200) keep the clinickly.com URL in the bar.
[[redirects]]
  from = "https://clinickly.com/*"
  to = "/clinically/:splat"
  status = 200
  force = true
[[redirects]]
  from = "https://www.clinickly.com/*"
  to = "/clinically/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
