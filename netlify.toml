[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Friendly short paths → the functions.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# copilot.clinickly.com (subdomain) → serve the Clinickly Co-pilot site,
# which lives under /clinically/, at the subdomain root. 200 = rewrite (URL stays).
# The apex clinickly.com is a separate site (the clinic) and is untouched.
[[redirects]]
  from = "https://copilot.clinickly.com/*"
  to = "/clinically/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
