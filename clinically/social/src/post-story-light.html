<!DOCTYPE html><html lang="en-GB"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,500;0,6..96,600;0,6..96,700&family=Hanken+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1920px}
  body{font-family:"Hanken Grotesk",system-ui,sans-serif}
  .card{width:1080px;height:1920px;padding:300px 90px;display:flex;flex-direction:column;align-items:center;
    text-align:center;background:radial-gradient(120% 60% at 50% 12%,#EAF7F5 0%,#FFFFFF 55%);color:#10151C;position:relative;overflow:hidden}
  .lock{display:flex;align-items:center;gap:18px}
  .mark{width:88px;height:88px;border-radius:24px;flex:0 0 auto;display:grid;place-items:center;
    background:linear-gradient(150deg,#0E8C84,#13B3A8);box-shadow:0 12px 34px rgba(14,140,132,.35)}
  .mark svg{width:52px;height:52px}
  .nm{font-family:"Bodoni Moda",Georgia,serif;font-weight:700;font-size:60px;letter-spacing:-.01em;color:#10151C}
  .nm .k{color:#0E8C84}
  .nm .cp{font-size:.5em;font-weight:500;opacity:.55}
  .kick{font-family:"IBM Plex Mono",monospace;font-size:26px;font-weight:600;letter-spacing:.2em;
    text-transform:uppercase;color:#0A6E68;margin-top:90px}
  .title{font-family:"Bodoni Moda",Georgia,serif;font-weight:600;font-size:128px;line-height:1.03;
    letter-spacing:-.015em;color:#10151C;margin-top:40px}
  .sub{font-size:42px;font-weight:400;line-height:1.4;color:#5A6B72;margin-top:50px}
  .spacer{flex:1}
  .pill{display:inline-flex;align-items:center;gap:16px;background:#0E8C84;color:#fff;font-weight:700;
    font-size:38px;padding:32px 56px;border-radius:100px;box-shadow:0 16px 36px rgba(14,140,132,.3)}
  .pill svg{width:34px;height:34px;fill:#fff}
  .url{font-family:"IBM Plex Mono",monospace;font-size:34px;color:#0A6E68;margin-top:54px}
</style></head>
<body><div class="card">
  <div class="lock">
    <span class="mark"><svg viewBox="0 0 24 24"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z" fill="none" stroke="#fff" stroke-width="1.7" stroke-linejoin="round"/><path d="M18 4l.7 1.8L20.5 6.5l-1.8.7L18 9l-.7-1.8L15.5 6.5l1.8-.7z" fill="#fff"/></svg></span>
    <span class="nm">Clinic<span class="k">kly</span><span class="cp"> Co-pilot</span></span>
  </div>
  <div class="kick">An AI co-pilot · A human MDT</div>
  <div class="title">A co-pilot<br>for clinicians.</div>
  <div class="sub">Supports your judgement —<br>never replaces it.</div>
  <div class="spacer"></div>
  <span class="pill"><svg viewBox="0 0 24 24"><path d="M7 4.5v15l13-7.5z"/></svg> Try the interactive demo</span>
  <div class="url">faheemahmed.co.uk/clinically</div>
</div></body></html>
