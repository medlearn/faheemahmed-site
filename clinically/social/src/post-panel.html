<!DOCTYPE html><html lang="en-GB"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,500;0,6..96,600;0,6..96,700&family=Hanken+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_base.css">
<style>
  html,body,.card{width:1080px;height:1080px}
  .card{padding:84px 84px}
  .mark{width:70px;height:70px}.mark svg{width:42px;height:42px}
  .brandname{font-size:42px}
  .kick{font-size:18px;letter-spacing:.22em;margin-top:84px}
  .display{font-size:80px;margin-top:26px}
  .sub{font-size:30px;color:#CFF0EC;font-weight:300;margin-top:30px;line-height:1.4;max-width:840px}
  .chiprow{margin-top:46px}
  .chip{font-size:25px;padding:16px 26px}
  .pill{font-size:28px;padding:22px 40px;margin-top:auto;align-self:flex-start}
  .pill svg{width:24px;height:24px;stroke:#0A6E68}
  .foot{font-size:22px;margin-top:38px}
</style></head>
<body><div class="card dark">
  <div class="lock">
    <span class="mark"><svg class="spark-white" viewBox="0 0 24 24"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z" fill="none" stroke-width="1.7" stroke-linejoin="round"/><path d="M18 4l.7 1.8L20.5 6.5l-1.8.7L18 9l-.7-1.8L15.5 6.5l1.8-.7z" fill="#fff"/></svg></span>
    <span class="brandname">Clinic<span class="a">kly</span><span class="cp"> Co-pilot</span></span>
  </div>
  <div class="kick">Calling experienced clinicians</div>
  <div class="display">Join the<br>clinical <span class="hl">panel.</span></div>
  <div class="sub">Help raise the floor on safe, reflective prescribing for a fast-growing group of independent prescribers.</div>
  <div class="chiprow">
    <span class="chip"><span class="dot"></span> Paid sessional work</span>
    <span class="chip"><span class="dot"></span> Virtual &amp; flexible</span>
    <span class="chip"><span class="dot"></span> GP · Psychiatry · Derm</span>
  </div>
  <span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"><path d="M21 3 10.5 13.5M21 3l-6.5 18-4-8-8-4z"/></svg> Express your interest</span>
  <div class="foot">copilot.clinickly.com</div>
</div></body></html>
