<!DOCTYPE html><html lang="en-GB"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,500;0,6..96,600;0,6..96,700&family=Hanken+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_base.css">
<style>
  html,body,.card{width:1080px;height:1080px}
  .card{padding:84px 84px}
  .mark{width:70px;height:70px}.mark svg{width:42px;height:42px}
  .brandname{font-size:42px;color:#10151C}
  .kick{font-size:18px;letter-spacing:.22em;margin-top:78px}
  .display{font-size:74px;margin-top:26px;color:#10151C}
  .list{margin-top:50px;display:flex;flex-direction:column;gap:26px;position:relative;z-index:2}
  .item{display:flex;align-items:center;gap:24px;font-size:33px;font-weight:500;color:#22302e}
  .item .tick{width:52px;height:52px;border-radius:14px;background:var(--brand-soft);display:grid;place-items:center;flex:0 0 auto}
  .item .tick svg{width:28px;height:28px;stroke:var(--brand-deep)}
  .pill{font-size:28px;padding:22px 40px;margin-top:auto;align-self:flex-start;background:var(--brand);color:#fff}
  .pill svg{width:24px;height:24px;stroke:#fff}
  .foot{font-size:22px;margin-top:38px}
</style></head>
<body><div class="card light">
  <div class="lock">
    <span class="mark"><svg class="spark-white" viewBox="0 0 24 24"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z" fill="none" stroke-width="1.7" stroke-linejoin="round"/><path d="M18 4l.7 1.8L20.5 6.5l-1.8.7L18 9l-.7-1.8L15.5 6.5l1.8-.7z" fill="#fff"/></svg></span>
    <span class="brandname">Clinic<span class="a">kly</span><span class="cp"> Co-pilot</span></span>
  </div>
  <div class="kick">For pharmacies, prescribers &amp; clinics</div>
  <div class="display">Less admin.<br>Cleaner records.</div>
  <div class="list">
    <div class="item"><span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 6.5"/></svg></span>Notes drafted in seconds</div>
    <div class="item"><span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 6.5"/></svg></span>Guideline-backed decision support</div>
    <div class="item"><span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 6.5"/></svg></span>An audit trail that stands up</div>
  </div>
  <span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"><rect x="3.5" y="4.5" width="17" height="16" rx="2"/><path d="M3.5 9h17M8 2.5v4M16 2.5v4"/></svg> Book a demo</span>
  <div class="foot">faheemahmed.co.uk/clinically</div>
</div></body></html>
