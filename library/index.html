<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Video Library — Faheem Ahmed | Clinical training videos</title>
<meta name="description" content="Buy and watch individual clinical training videos from Faheem Ahmed — independent prescribing, ADHD, OSCE skills, pharmacy contract and more. Pay per video, yours to keep.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://faheemahmed.co.uk/library/">
<meta property="og:type" content="website">
<meta property="og:title" content="Video Library — Faheem Ahmed">
<meta property="og:description" content="Buy and watch individual clinical training videos from Faheem Ahmed. Pay per video, yours to keep.">
<meta property="og:url" content="https://faheemahmed.co.uk/library/">
<meta property="og:image" content="https://faheemahmed.co.uk/og-image.jpg">

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #15211C; --paper: #EAEEE8; --card: #FFFFFF;
  --green: #1F6B4F; --green-deep: #164E39; --green-soft: #E3EDE6;
  --brass: #A67C2E; --brass-soft: #F4ECD9; --muted: #5E6862; --line: #D8DED5;
  --display: 'Fraunces', Georgia, serif;
  --sans: 'Hanken Grotesk', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
body { background: var(--paper); }

.fa-root {
  --ink: #15211C;
  --paper: #EAEEE8;
  --card: #FFFFFF;
  --green: #1F6B4F;
  --green-deep: #164E39;
  --green-soft: #E3EDE6;
  --brass: #A67C2E;
  --brass-soft: #F4ECD9;
  --muted: #5E6862;
  --line: #D8DED5;
  --display: 'Fraunces', Georgia, serif;
  --sans: 'Hanken Grotesk', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;

  font-family: var(--sans);
  color: var(--ink);
  background: var(--paper);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.fa-root button { font-family: var(--sans); cursor: pointer; border: none; background: none; }
.fa-root input { font-family: var(--sans); }
.fa-root :focus-visible { outline: 2px solid var(--green); outline-offset: 2px; border-radius: 4px; }

/* ── eyebrow / wordmark ── */
.fa-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--green);
}
.fa-wordmark { font-family: var(--display); font-weight: 600; letter-spacing: -0.01em; line-height: 1; }

/* ── top bar ── */
.fa-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 28px;
  border-bottom: 1px solid var(--line);
  background: rgba(234,238,232,0.85);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 20;
}
.fa-bar .mark { display: flex; flex-direction: column; gap: 3px; }
.fa-bar .mark .name { font-family: var(--display); font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
.fa-userbox { display: flex; align-items: center; gap: 14px; }
.fa-userbox .who { font-size: 13px; color: var(--muted); }
.fa-logout {
  font-size: 13px; font-weight: 600; color: var(--ink);
  padding: 7px 13px; border-radius: 999px; border: 1px solid var(--line);
  transition: background .15s, border-color .15s;
}
.fa-logout:hover { background: #fff; border-color: var(--ink); }

/* ── login ── */
.fa-login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
.fa-login-card {
  width: 100%; max-width: 420px;
  background: var(--card); border: 1px solid var(--line);
  border-radius: 20px; padding: 40px 36px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 24px 60px -30px rgba(21,33,28,0.35);
}
.fa-login-card .rx {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--green-soft); color: var(--green);
  display: grid; place-items: center; font-family: var(--display);
  font-weight: 700; font-size: 22px; margin-bottom: 22px;
}
.fa-login-card h1 {
  font-family: var(--display); font-weight: 600; font-size: 27px;
  letter-spacing: -0.015em; line-height: 1.15; margin-bottom: 8px;
}
.fa-login-card p.sub { color: var(--muted); font-size: 14.5px; line-height: 1.5; margin-bottom: 26px; }
.fa-field { margin-bottom: 16px; }
.fa-field label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.02em; margin-bottom: 7px; color: var(--ink); }
.fa-input {
  width: 100%; padding: 13px 15px; font-size: 15px;
  border: 1px solid var(--line); border-radius: 11px; background: #FCFDFB;
  transition: border-color .15s, background .15s;
}
.fa-input:focus { border-color: var(--green); background: #fff; outline: none; }
.fa-input.code { font-family: var(--mono); letter-spacing: 0.5em; text-align: center; font-size: 20px; padding-left: 0.5em; }
.fa-root .fa-btn-primary {
  width: 100%; padding: 13px; border-radius: 11px;
  background: var(--green); color: #fff; font-weight: 600; font-size: 15px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: background .15s, transform .05s;
}
.fa-btn-primary:hover { background: var(--green-deep); }
.fa-btn-primary:active { transform: translateY(1px); }
.fa-btn-primary:disabled { opacity: .7; cursor: default; }
.fa-hint { font-size: 12.5px; color: var(--muted); margin-top: 14px; text-align: center; }
.fa-hint b { color: var(--green); font-family: var(--mono); }
.fa-err { font-size: 13px; color: #B23A48; margin-top: 14px; text-align: center; min-height: 1em; }
.fa-link { background: none; color: var(--muted); font-size: 13px; text-decoration: underline; text-underline-offset: 3px; margin-top: 16px; display: block; width: 100%; text-align: center; }
.fa-link:hover { color: var(--ink); }

/* ── dashboard ── */
.fa-main { max-width: 1120px; margin: 0 auto; padding: 40px 28px 80px; }
.fa-lib-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
.fa-lib-head h2 { font-family: var(--display); font-size: 32px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
.fa-lib-head .count { font-size: 14px; color: var(--muted); margin-top: 9px; }
.fa-filter { display: inline-flex; background: #fff; border: 1px solid var(--line); border-radius: 999px; padding: 3px; }
.fa-filter button { font-size: 13px; font-weight: 600; color: var(--muted); padding: 7px 16px; border-radius: 999px; transition: color .15s; }
.fa-filter button.on { background: var(--ink); color: #fff; }

.fa-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 22px; }

/* ── category sections ── */
.fa-cat { margin-bottom: 44px; }
.fa-cat:last-child { margin-bottom: 0; }
.fa-cat-title {
  font-family: var(--display); font-size: 21px; font-weight: 600;
  letter-spacing: -0.01em; margin: 0 0 18px; padding-bottom: 11px;
  border-bottom: 1px solid var(--line);
}

.fa-card {
  background: var(--card); border: 1px solid var(--line); border-radius: 16px;
  overflow: hidden; display: flex; flex-direction: column;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.fa-card:hover { transform: translateY(-3px); box-shadow: 0 20px 44px -28px rgba(21,33,28,0.5); border-color: #C8D0C4; }
.fa-card.owned { border-color: var(--brass); }

.fa-thumb { position: relative; aspect-ratio: 16/9; display: grid; place-items: center; background-size: cover; background-position: center; }
.fa-thumb .play {
  width: 54px; height: 54px; border-radius: 999px; background: rgba(255,255,255,0.92);
  display: grid; place-items: center; box-shadow: 0 8px 20px -8px rgba(0,0,0,0.5);
  transition: transform .18s;
}
.fa-card:hover .fa-thumb .play { transform: scale(1.08); }
.fa-thumb .play svg { margin-left: 3px; }
.fa-dur {
  position: absolute; bottom: 10px; right: 10px;
  font-family: var(--mono); font-size: 11px; color: #fff;
  background: rgba(0,0,0,0.42); padding: 3px 8px; border-radius: 6px; backdrop-filter: blur(2px);
}
.fa-seal {
  position: absolute; top: 10px; left: 10px;
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--brass); background: var(--brass-soft);
  padding: 4px 9px; border-radius: 999px; border: 1px solid rgba(166,124,46,0.35);
}

.fa-card-body { padding: 18px 18px 20px; display: flex; flex-direction: column; flex: 1; }
.fa-card-body h3 { font-family: var(--display); font-size: 18px; font-weight: 600; line-height: 1.22; letter-spacing: -0.01em; margin-bottom: 9px; }
.fa-card-body .blurb { font-size: 13.5px; line-height: 1.5; color: var(--muted); flex: 1; margin-bottom: 18px; }

.fa-card-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.fa-price { font-family: var(--mono); font-size: 17px; font-weight: 500; }
.fa-root .fa-buy {
  padding: 9px 18px; border-radius: 999px; background: var(--green); color: #fff;
  font-weight: 600; font-size: 13.5px; transition: background .15s;
  display: inline-flex; align-items: center; gap: 7px;
}
.fa-buy:hover { background: var(--green-deep); }
.fa-buy:disabled { opacity: .7; cursor: default; }
.fa-root .fa-watch {
  padding: 9px 18px; border-radius: 999px; background: var(--ink); color: #fff;
  font-weight: 600; font-size: 13.5px; display: inline-flex; align-items: center; gap: 7px; transition: opacity .15s;
}
.fa-watch:hover { opacity: 0.88; }
.fa-watch:disabled { opacity: .6; cursor: default; }

/* ── empty / loading ── */
.fa-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.fa-empty h3 { font-family: var(--display); font-size: 22px; color: var(--ink); margin-bottom: 8px; }

/* ── overlay / modals ── */
.fa-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(15,24,20,0.55); backdrop-filter: blur(4px);
  display: grid; place-items: center; padding: 24px;
  animation: faFade .18s ease;
}
@keyframes faFade { from { opacity: 0; } to { opacity: 1; } }
@keyframes faPop { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: none; } }

.fa-close { font-size: 20px; color: var(--muted); width: 30px; height: 30px; border-radius: 8px; }
.fa-close:hover { background: var(--paper); color: var(--ink); }
.fa-spin { width: 17px; height: 17px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 999px; animation: faSpin .7s linear infinite; display: inline-block; }
.fa-spin.dark { border-color: rgba(21,33,28,0.2); border-top-color: var(--ink); }
@keyframes faSpin { to { transform: rotate(360deg); } }

/* ── player ── */
.fa-player { width: 100%; max-width: 860px; animation: faPop .2s ease; }
.fa-player-frame { position: relative; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; display: grid; place-items: center; background: #0F1814; }
.fa-player-frame iframe { width: 100%; height: 100%; border: 0; display: block; }
.fa-player-meta { background: #fff; border-radius: 14px; padding: 20px 22px; margin-top: 14px; }
.fa-player-meta h3 { font-family: var(--display); font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.fa-player-meta p { font-size: 14px; color: var(--muted); line-height: 1.55; }
.fa-player-note { margin-top: 14px; font-size: 12px; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 7px; }
.fa-back { color: #fff; font-size: 13px; font-weight: 600; margin-bottom: 14px; display: inline-flex; align-items: center; gap: 7px; }
.fa-back:hover { opacity: 0.8; }

/* ── toast ── */
.fa-toast {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 60;
  background: var(--ink); color: #fff; padding: 13px 20px; border-radius: 12px;
  font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 20px 40px -20px rgba(0,0,0,0.6); animation: faPop .22s ease; max-width: 90vw;
}
.fa-toast .ok { color: #7BD3A6; flex-shrink: 0; }
.fa-toast.err { background: #6E2230; }

/* ── footer ── */
.fa-foot { border-top: 1px solid var(--line); background: var(--card); }
.fa-foot-inner {
  max-width: 1120px; margin: 0 auto; padding: 40px 28px 26px;
  display: flex; flex-wrap: wrap; gap: 26px 40px; justify-content: space-between; align-items: flex-start;
  font-family: var(--sans);
}
.fa-foot-brand .fa-eyebrow { color: var(--green); }
.fa-foot-brand .nm { font-family: var(--display); font-size: 19px; font-weight: 600; display: block; margin: 4px 0 8px; color: var(--ink); }
.fa-foot-brand p { color: var(--muted); font-size: 13.5px; line-height: 1.5; max-width: 320px; }
.fa-foot-links { display: flex; flex-wrap: wrap; gap: 10px 24px; }
.fa-foot-links a { color: var(--ink); font-size: 14px; font-weight: 500; text-decoration: none; }
.fa-foot-links a:hover { color: var(--green); text-decoration: underline; text-underline-offset: 3px; }
.fa-foot-links a.home { color: var(--green); font-weight: 600; }
.fa-foot-bottom {
  max-width: 1120px; margin: 0 auto; padding: 16px 28px 36px;
  display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap;
  border-top: 1px solid var(--line); color: var(--muted);
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.02em;
}

@media (prefers-reduced-motion: reduce) {
  .fa-root * { animation: none !important; transition: none !important; }
}
@media (max-width: 560px) {
  .fa-main { padding: 26px 18px 70px; }
  .fa-bar { padding: 16px 18px; }
  .fa-lib-head h2 { font-size: 26px; }
}
</style>
</head>
<body>
  <div id="root" class="fa-root" aria-busy="true"></div>

  <footer class="fa-foot">
    <div class="fa-foot-inner">
      <div class="fa-foot-brand">
        <span class="fa-eyebrow">Video library</span>
        <span class="nm">Faheem Ahmed</span>
        <p>Clinical, business and mentoring training — buy individual videos, yours to keep.</p>
      </div>
      <nav class="fa-foot-links" aria-label="Footer">
        <a class="home" href="/">← Back to faheemahmed.co.uk</a>
        <a href="/#services">Services</a>
        <a href="/#writing">Writing</a>
        <a href="/#videos">Videos</a>
        <a href="/#booking">Book a session</a>
        <a href="mailto:hello@faheemahmed.co.uk">Contact</a>
      </nav>
    </div>
    <div class="fa-foot-bottom">
      <span>© 2026 Faheem Ahmed</span>
      <span>faheemahmed.co.uk</span>
    </div>
  </footer>

  <!-- Supabase JS (UMD global: window.supabase) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
