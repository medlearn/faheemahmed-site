<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Page not found | Faheem Ahmed</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://faheemahmed.co.uk/">
<meta name="theme-color" content="#2F6BFF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,600&family=Hanken+Grotesk:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#14161C;--accent:#2F6BFF;--accent-deep:#1F54E0;--muted:#5B6472;--tint:#F4F6FA;
        --display:"Bodoni Moda",Georgia,serif;--sans:"Hanken Grotesk",system-ui,sans-serif;--mono:"IBM Plex Mono",monospace}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;padding:32px;
       background:var(--tint);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .card{max-width:560px;text-align:center}
  .kicker{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep)}
  h1{font-family:var(--display);font-weight:600;font-size:clamp(2.2rem,7vw,3.4rem);line-height:1.08;margin:.5rem 0 0}
  p{color:var(--muted);font-size:1.02rem;line-height:1.65;margin:1rem 0 2rem}
  .links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-block;padding:12px 22px;border-radius:999px;text-decoration:none;font-size:.92rem;
        background:var(--accent);color:#fff;border:1px solid var(--accent)}
  a.btn.outline{background:transparent;color:var(--accent-deep)}
  a.btn:hover{background:var(--accent-deep);border-color:var(--accent-deep);color:#fff}
</style>
</head>
<body>
  <main class="card">
    <span class="kicker">Error 404</span>
    <h1>That page isn&rsquo;t here.</h1>
    <p>The link may be out of date, or the page may have moved. The writing archive is the best place to pick up where you left off.</p>
    <div class="links">
      <a class="btn" href="/">Back to home</a>
      <a class="btn outline" href="/blog/">Read the articles</a>
    </div>
  </main>
</body>
</html>
